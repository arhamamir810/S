      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="teddy">🧸</div>

        <h1>I'm Sorry ❤️</h1>

        <p>
            I know I made a mistake.  
            I really value our friendship and I hope you forgive me.
        </p>

        <button id="nextBtn">Click Here 💌</button>
    </div>


    <div class="popup" id="popup">
        <div class="box">
            <h2>Will you forgive me? 🥺</h2>
            <button id="yes">Yes ❤️</button>
            <button id="no">Not yet 😅</button>
        </div>
    </div>


    <div class="popup" id="thanks">
        <div class="box">
            <h2>Thank You ❤️🧸</h2>
            <p>You are special to me. 😊</p>
        </div>
    </div>


    <script src="script.js"></script>

</body>
</html>
