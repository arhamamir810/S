    <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hearts">
    ❤️ 💕 💗 ❤️ 💖
</div>

<div class="card">

    <div class="teddy">🧸</div>

    <h1>Hey SUNBAL, I'm Sorry ❤️</h1>

    <p>
        I just wanted to say that I really feel sorry.
        Your friendship means a lot to me and I hope we can smile again 😊
    </p>

    <button id="startBtn">Click Here 💌</button>

</div>


<div class="popup" id="popup">

    <div class="box">

        <h2 id="question">
            Do you think we can be okay again? 🥺
        </h2>

        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>

    </div>

</div>


<div class="popup" id="final">

    <div class="box">

        <h2>Thank You ❤️🧸</h2>

        <p>
            I'm really happy.
            Let's keep smiling and make more good memories 😊
        </p>

    </div>

</div>


<script src="script.js"></script>

</body>

</html>
